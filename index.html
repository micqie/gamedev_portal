<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameDev Portal</title>
  <link rel="icon" type="logo/png" href="logo/game.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar - Grey theme */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #6b7280; border-radius: 10px; }

    :root {
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.18);
      --grid: rgba(255, 255, 255, 0.035);
    }

    body {
      background-color: #050505;
      background-image:
        linear-gradient(0deg, var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    .text-red { color: var(--red); }
    .accent-bar { background: var(--red); box-shadow: 0 0 12px var(--red-dim); }
    .chip-red { background: var(--red-dim); color: #fff; border: 1px solid rgba(239, 68, 68, 0.35); }
    .header-glow { box-shadow: 0 6px 16px rgba(239, 68, 68, 0.08); }
    .title-pill {
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.22);
      padding: 5px 10px;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .y8-card {
      background: #111;
      border: 1px solid #333;
      transition: all 0.2s ease-in-out;
    }
    .y8-card:hover {
      border-color: #ccc;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }
    .thumb-wrap {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #1f2937;
    }
    .game-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body class="flex flex-col min-h-screen">

  <header class="bg-black border-b border-gray-800 sticky top-0 z-50 header-glow">
    <nav class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <img src="logo/game.png" alt="GamesDev Logo" class="w-8 h-8 rounded object-cover" />
        <span class="text-white font-black text-xl tracking-tighter">GAME<span class="text-red">DEV</span></span>
      </div>

      <div class="relative flex-grow max-w-md">
        <input type="text" id="gameSearch" placeholder="Search games..."
               class="w-full bg-gray-900 border border-gray-700 text-white text-sm rounded-full py-2 px-4 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500">
        <button class="absolute right-3 top-2 text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
      </div>

      <div class="hidden md:flex gap-4 text-xs font-bold uppercase">

      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto w-full px-4 py-6">

    <div id="indicators-carousel" class="relative w-full h-56 md:h-80 mb-8 overflow-hidden rounded-lg border border-gray-800">
      <video class="w-full h-full object-cover opacity-80" muted autoplay loop playsinline>
        <source src="assets/videos/gamedev2.mp4" type="video/mp4">
      </video>
      <div class="absolute bottom-4 left-6">
        <span class="chip-red px-3 py-1 rounded text-xs font-bold uppercase">Features</span>
      </div>
    </div>

    <div class="flex items-center justify-between mb-4 border-b border-gray-800 pb-2">
      <h2 class="text-lg font-bold flex items-center gap-2">
        <span class="w-2 h-5 accent-bar"></span>GAMES
      </h2>
      <span class="text-gray-500 text-xs uppercase">Showing <span id="gameCount" class="text-white">0</span> Games</span>
    </div>

    <div id="product-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-3">
      </div>
  </main>

  <footer class="mt-auto border-t border-gray-900 bg-black p-8 text-center text-gray-500 text-xs">
    <p>&copy; 2026 GamesDev Portal</p>
  </footer>

  <script>
    const games = [
      { name: "Campus Defender", img: "assets/campus-defender.png" },
      { name: "Soul Switch", img: "assets/soul-switch.png" },
      { name: "Echoes of Amber", img: "assets/echoes-amber.png" },
      { name: "Shards of Salvation", img: "assets/shards-salvation.png" },
      { name: "The Final Exam", img: "assets/final-exam.png" },
      { name: "Escape from PETA", img: "assets/escape-peta.png" },
      { name: "Pandesal Bomber", img: "assets/pandesal-bomber.png" },
      { name: "Detention Breakout", img: "assets/detention-breakout.png" },
      { name: "Alien Invasion", img: "assets/alien-invasion.png" },
      { name: "Zombie Survival", img: "assets/zombie-survival.png" },
      { name: "Dystopia", img: "assets/dystopia.png" },
      { name: "Corruption Invaders CDO" , img: "assets/corruption-invaders.png" },
     { name: "NUMEN in the sewers" , img: "assets/numen.png" },
      { name: "Kagay-an Survivor" , img: "assets/kagayan-survivor.png" },
     { name: "Web of Survival" , img: "assets/web-survival.png" }




    ];

    const container = document.getElementById("product-container");
    const searchInput = document.getElementById("gameSearch");
    const countDisplay = document.getElementById("gameCount");

    // Single featured video (no carousel rotation)

    function displayGames(filter = "") {
      container.innerHTML = "";
      const filtered = games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase()));
      countDisplay.innerText = filtered.length;

      filtered.forEach(game => {
        container.innerHTML += `
          <div class="flex flex-col items-center gap-2">
            <a href="game.html?name=${encodeURIComponent(game.name)}" class="y8-card rounded overflow-hidden flex flex-col w-full">
              <div class="thumb-wrap">
                <img src="${game.img}" alt="${game.name}" class="game-thumb">
              </div>
            </a>
            <span class="title-pill">${game.name}</span>
          </div>
        `;
      });
    }

    // Search Logic
    searchInput.addEventListener('input', (e) => {
      displayGames(e.target.value);
    });

    // Initial Load
    displayGames();
  </script>
</body>
</html>
